version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: oasys-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: oasys
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shared-app-network

  backend:
    build: .
    container_name: oasys-backend
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://admin:admin123@oasys-postgres:5432/oasys
    depends_on:
      - postgres
    networks:
      - shared-app-network

volumes:
  postgres_data:

networks:
  shared-app-network:
    external: true
